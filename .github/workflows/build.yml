name: 自动构建 Enigma2 IPK 插件包

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 拉取最新代码
        uses: actions/checkout@v4

      - name: 🛠️ 组装并清洗换行符 (防 126 错误)
        run: |
          mkdir -p ipk/CONTROL ipk/usr
          # 精准对齐你仓库里的 ipk_build 路径
          cp -r ipk_build/CONTROL/* ipk/CONTROL/
          cp -r ipk_build/usr/* ipk/usr/
          
          # 强行把 Windows 的 CRLF 转换为 Linux 的 LF，彻底杜绝 bad interpreter 报错
          sed -i 's/\r$//' ipk/CONTROL/postinst || true
          chmod 755 ipk/CONTROL/postinst || true

      - name: 📦 终极缝合打包 (ar 命令)
        run: |
          cd ipk
          tar -czf ../control.tar.gz -C CONTROL .
          tar -czf ../data.tar.gz usr
          echo "2.0" > ../debian-binary
          cd ..
          ar -crv enigma2-plugin-extensions-githubbouquet_all.ipk debian-binary control.tar.gz data.tar.gz

      - name: 💾 保存打包成品
        uses: actions/upload-artifact@v4
        with:
          name: githubbouquet-plugin-ipk
          path: enigma2-plugin-extensions-githubbouquet_all.ipk
